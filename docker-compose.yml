version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campusconnect-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campusconnect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campusconnect-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/campusconnect?schema=public
      - JWT_SECRET=supersecretcampusconnectjwttokenhashvalue12345
    depends_on:
      - db

volumes:
  pgdata:
